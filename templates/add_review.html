{% extends 'base.html' %}

{% block title %}Написать рецензию - Электронная библиотека{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('index') }}">Главная</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('view_book', book_id=book.id) }}">{{ book.title }}</a></li>
        <li class="breadcrumb-item active" aria-current="page">Написать рецензию</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="fa-solid fa-pen-nib me-2"></i>Написать рецензию</h4>
            </div>
            <div class="card-body p-4">
                <h5 class="text-secondary mb-4">Книга: <strong>{{ book.title }}</strong></h5>
                
                <form action="{{ url_for('add_review', book_id=book.id) }}" method="POST">
                    <!-- Поле Оценка (отображаются только названия, передаются числа) -->
                    <div class="mb-3">
                        <label for="rating" class="form-label fw-bold">Оценка</label>
                        <select class="form-select" id="rating" name="rating">
                            <option value="5" {% if rating == '5' or not rating %}selected{% endif %}>отлично</option>
                            <option value="4" {% if rating == '4' %}selected{% endif %}>хорошо</option>
                            <option value="3" {% if rating == '3' %}selected{% endif %}>удовлетворительно</option>
                            <option value="2" {% if rating == '2' %}selected{% endif %}>неудовлетворительно</option>
                            <option value="1" {% if rating == '1' %}selected{% endif %}>плохо</option>
                            <option value="0" {% if rating == '0' %}selected{% endif %}>ужасно</option>
                        </select>
                    </div>

                    <!-- Поле Текст рецензии (тег textarea) — атрибут required удален для корректной работы HTML5 валидации со скрытыми элементами -->
                    <div class="mb-4">
                        <label for="text" class="form-label fw-bold">Текст рецензии</label>
                        <textarea class="form-control" id="text" name="text" rows="8">{{ review_text or '' }}</textarea>
                    </div>

                    <!-- Кнопки управления -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark px-4 fw-semibold">Сохранить</button>
                        <a href="{{ url_for('view_book', book_id=book.id) }}" class="btn btn-outline-secondary px-4">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- EasyMDE CSS & JS для поддержки разметки Markdown -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    // Инициализация Markdown редактора для textarea рецензии
    const easyMDE = new EasyMDE({
        element: document.getElementById('text'),
        spellChecker: false,
        status: false,
        forceSync: true, // Принудительная синхронизация текста с оригинальным скрытым textarea
        autosave: { enabled: false }
    });
</script>
{% endblock %}
